base_model: "mistralai/Mistral-7B-Instruct-v0.2"
output_dir: "data/models/lora_adapter_r8"

lora:
  r: 8
  lora_alpha: 16
  target_modules:
    - q_proj
    - v_proj
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  num_epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_seq_length: 2048
  fp16: false
  bf16: true
  logging_steps: 10
  eval_steps: 50
  save_steps: 100
  load_best_model_at_end: true

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

wandb:
  project: "credit-risk-detection"
  run_name: "lora-r8"
